<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join | Cognis11</title>
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Start your structural learning path.</p>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signup-email">
        </div>
        <div class="form-group">
            <label>Choose Password</label>
            <input type="password" id="signup-password" placeholder="Min. 6 characters">
        </div>
        
        <button onclick="handleSignUp()">Start Learning</button>
        <div id="error-msg" class="error-msg"></div>

        <div class="toggle-link">
            Already registered? <a href="login.html">Sign in here</a>
        </div>
    </div>

    <script src="js/auth-system.js"></script>
    <script>
        // Autofill email if passed from Diagnostic URL (?email=test@test.com)
        const params = new URLSearchParams(window.location.search);
        if (params.has('email')) {
            document.getElementById('signup-email').value = params.get('email');
        }
    </script>
</body>
</html>
