<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cognis 11+</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy:#1B3A5C; --steel:#2E6DA4; --cream:#FAFAF6; --lgrey:#E5E3DD; --mgrey:#888; --dgrey:#3A3A3A; }
        * { box-sizing:border-box; margin:0; padding:0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dgrey); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. GLOBAL NAV (Matches Index) */
        nav { 
            border-bottom: 1px solid var(--lgrey); 
            padding: 18px 32px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #fff; 
            width: 100%;
        }
        .brand { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            color: var(--navy); 
            font-weight: 700; 
            text-decoration: none; 
        }
        .nav-right a {
            font-size: 0.88rem;
            color: var(--mgrey);
            text-decoration: none;
            font-weight: 500;
        }

        /* 2. CENTERED LOGIN CONTAINER */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--lgrey);
            box-shadow: 0 20px 50px rgba(27, 58, 92, 0.05);
            text-align: center;
        }

        .auth-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--navy);
            margin-bottom: 10px;
        }

        .auth-card p {
            font-size: 0.95rem;
            color: var(--mgrey);
            margin-bottom: 30px;
        }

        /* 3. FORM STYLING */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--lgrey);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            color: var(--dgrey);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--steel);
        }

        button {
            width: 100%;
            background: var(--navy);
            color: #fff;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--steel);
        }

        .error-msg {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--mgrey);
        }

        .toggle-link a {
            color: var(--steel);
            text-decoration: none;
            font-weight: 600;
        }

        /* 4. FOOTER */
        footer {
            padding: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--mgrey);
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>

<nav>
    <a href="index.html" class="brand">Cognis 11+</a>
    <div class="nav-right">
        <a href="index.html">Back to Home</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Continue your reasoning-first preparation.</p>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="parent@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        
        <button onclick="handleLogin()">Sign In</button>
        <div id="error-msg" class="error-msg"></div>

        <div class="toggle-link">
            Don't have an account? <a href="subscribe.html">Get access here</a>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 Cognis 11+. All rights reserved.
</footer>

<script src="js/auth-system.js"></script>
</body>
</html>
